<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System (KDS)</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #000000;
            --color-card: #1a1a1a;
            --color-accent: #66fcf1;
            --color-warning: #ff9f43;
            --color-success: #2ed573;
            --color-text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--color-bg);
            color: var(--color-text);
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--color-card);
            margin-bottom: 20px;
        }

        .kds-title {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--color-accent);
        }

        .clock {
            font-size: 1.2em;
            font-weight: 600;
        }

        .kitchen-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .order-card {
            background: var(--color-card);
            border-radius: 12px;
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: 0.3s;
        }

        .order-header {
            background: #333;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
        }

        .order-id {
            font-weight: 700;
            color: var(--color-accent);
        }

        .order-timer {
            font-family: monospace;
            color: var(--color-warning);
        }

        .order-body {
            padding: 15px;
        }

        .item-row {
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }

        .order-footer {
            padding: 10px;
        }

        .btn-done {
            width: 100%;
            background: var(--color-success);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-done:hover {
            opacity: 0.9;
        }

        .empty-msg {
            text-align: center;
            margin-top: 50px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <header>
        <div class="kds-title">KITCHEN DISPLAY (KDS)</div>
        <div class="clock" id="live-clock"></div>
    </header>

    <div class="kitchen-grid" id="kitchen-grid"></div>

    <!-- COMMON JS -->
    <script src="app.js"></script>

    <script>
        // 🕒 CLOCK
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 🍽️ LOAD ORDERS
        function loadKitchenOrders() {
            const orders = getOrders();
            const container = document.getElementById("kitchen-grid");

            container.innerHTML = "";

            const activeOrders = orders.filter(o => o.status !== "READY");

            if (activeOrders.length === 0) {
                container.innerHTML = `<div class="empty-msg">No Active Orders</div>`;
                return;
            }

            activeOrders.forEach(order => {

                const card = document.createElement("div");
                card.className = "order-card";

                card.innerHTML = `
                    <div class="order-header">
                        <span class="order-id">#${order.id}</span>
                        <span class="order-timer">${order.time}</span>
                    </div>

                    <div class="order-body">
                        ${order.items.map(item => `
                            <div class="item-row">${item.name}</div>
                        `).join("")}
                    </div>

                    <div class="order-footer">
                        <button class="btn-done" onclick="completeOrder('${order.id}')">
                            Ready to Serve
                        </button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ✅ COMPLETE ORDER
        function completeOrder(id) {
            updateOrderStatus(id, "READY");
            loadKitchenOrders();
        }

        // 🔄 AUTO REFRESH
        setInterval(loadKitchenOrders, 2000);
        loadKitchenOrders();
    </script>

</body>
</html>
