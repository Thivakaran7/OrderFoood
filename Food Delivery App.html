<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOODIE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#0b0c10;
    --card:#1f2833;
    --accent:#66fcf1;
    --text:#c5c6c7;
    --white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--bg);color:var(--text);}
main{max-width:1300px;margin:auto;padding:30px;}

/* HEADER */
header{
    background:var(--card);
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    color:var(--accent);
    font-size:2.2em;
    font-weight:700;
}

/* CATEGORY */
#category-buttons-container{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-top:30px;
}

.category-item{
    padding:10px 18px;
    border-radius:30px;
    border:1px solid var(--accent);
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.category-item:hover{
    transform:translateY(-3px);
}

.category-item.active{
    background:var(--accent);
    color:black;
}

/* MENU GRID */
#menu-list-container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:35px;
    margin-top:40px;
}

/* CARD */
.restaurant-card{
    background:var(--card);
    border-radius:15px;
    overflow:hidden;
    border:1px solid rgba(102,252,241,0.2);
    transition:0.4s;
}

.restaurant-card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 30px rgba(102,252,241,0.2);
}

.restaurant-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-bottom:2px solid var(--accent);
}

.item-content{
    padding:20px;
}

.item-content h3{
    color:var(--accent);
    margin-bottom:5px;
}

.item-content p{
    font-size:0.9em;
    opacity:0.8;
}

/* PRICE + BUTTON */
.price-add{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

.add-to-cart{
    background:var(--accent);
    border:none;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:700;
    transition:0.3s;
}

.add-to-cart:hover{
    transform:scale(1.05);
}

/* CART BAR */
#floating-cart-bar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:var(--accent);
    color:black;
    padding:15px 40px;
    border-radius:50px;
    font-weight:700;
    display:flex;
    gap:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header>
<div class="logo">FOODIE</div>
</header>

<main>

<h2>What's on your mind?</h2>

<div id="category-buttons-container">
<div class="category-item active">All</div>
<div class="category-item">Biryani</div>
<div class="category-item">Burger</div>
<div class="category-item">Pizza</div>
<div class="category-item">Dosa</div>
<div class="category-item">Parotta</div>
<div class="category-item">Ice Cream</div>
<div class="category-item">Cakes</div>
<div class="category-item">Juice</div>
<div class="category-item">Noodles</div>
<div class="category-item">Salad</div>
</div>

<div id="menu-list-container"></div>

</main>

<div id="floating-cart-bar">
<span>0 Items Added</span>
</div>

<script>

// 🔥 SAME JS (UNCHANGED)

let cart = [];
let selectedCategory = "All";

document.querySelectorAll('.category-item').forEach(btn=>{
    btn.onclick = () => {
        document.querySelectorAll('.category-item')
        .forEach(b=>b.classList.remove('active'));

        btn.classList.add('active');
        selectedCategory = btn.innerText.trim();
        loadItems();
    };
});

function loadItems(){

    const container = document.getElementById("menu-list-container");
    container.innerHTML = "";

    const menu = JSON.parse(localStorage.getItem("menu")) || [];

    const staticItems = [
        {name:"Hyderabadi Biryani",price:220,category:"Biryani",image:"https://images.unsplash.com/photo-1589302168068-964664d93dc0"},
        {name:"Cheese Burger",price:150,category:"Burger",image:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
        {name:"Margherita Pizza",price:299,category:"Pizza",image:"https://images.unsplash.com/photo-1513104890138-7c749659a591"}
    ];

    const allItems = [...staticItems, ...menu];

    allItems.forEach(item => {

        if(selectedCategory !== "All" && item.category !== selectedCategory) return;

        const card = document.createElement("div");
        card.className = "restaurant-card";

        card.innerHTML = `
            <img src="${item.image}">
            <div class="item-content">
                <h3>${item.name}</h3>
                <p>${item.category}</p>
                <div class="price-add">
                    <span>₹${item.price}</span>
                    <button class="add-to-cart">ADD</button>
                </div>
            </div>
        `;

        container.appendChild(card);
    });

    attachCartEvents();
}

function attachCartEvents(){
    document.querySelectorAll('.add-to-cart').forEach(btn=>{
        btn.onclick = () => {

            const card = btn.closest('.restaurant-card');

            const name = card.querySelector('h3').innerText;
            const price = card.querySelector('.price-add span').innerText;
            const image = card.querySelector('img').src;

            cart.push({name,price,image});
            updateCartUI();
        };
    });
}

function updateCartUI(){
    document.getElementById("floating-cart-bar").innerHTML =
    `<span>${cart.length} Items Added</span>
     <span onclick="placeOrder()">Place Order →</span>`;
}

function createOrder(cartItems){
    const orders = JSON.parse(localStorage.getItem("orders")) || [];

    const newOrder = {
        id: "ORD-" + Date.now(),
        items: cartItems,
        status: "NEW"
    };

    orders.push(newOrder);
    localStorage.setItem("orders", JSON.stringify(orders));

    return newOrder;
}

function placeOrder(){
    if(cart.length === 0){
        alert("Cart empty da 😅");
        return;
    }

    const order = createOrder(cart);
    alert("Order Placed: " + order.id);

    cart = [];
    updateCartUI();
}

loadItems();

</script>

</body>
</html>
